name: Build & Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;34.0.0" > /dev/null 2>&1

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build signed release AAB
        run: ./gradlew bundleRelease --no-daemon --stacktrace
        env:
          KEYSTORE_PATH: ghostrac-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ghostrac
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build debug APK (for sideloading)
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghostrac-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghostrac-native-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Publish debug APK as latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-debug
          name: Latest Debug Build
          body: "Auto-published debug APK from latest main branch commit."
          files: app/build/outputs/apk/debug/app-debug.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
